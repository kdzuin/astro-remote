[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino
lib_deps =
    m5stack/M5Unified
monitor_speed = 115200
upload_speed = 1500000
board_build.partitions = huge_app.csv
# src/webclient is the static web remote (HTML/JS + its node_modules), not
# firmware — keep it out of the ESP32 build or PlatformIO tries to compile the
# .cc files under node_modules.
build_src_filter =
    +<*>
    -<webclient>
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -Os
    -I${PROJECT_DIR}/src
    -I${PROJECT_DIR}/src/hardware
build_unflags =
    -fno-rtti
build_type = release

build_src_flags =
    -fpch-preprocess
    -include ${PROJECT_DIR}/src/debug.h

# Native test environment: compiles logic on the host with fake hardware
# headers, so AstroProcess / SelectableList are testable without a device.
# test/mocks is listed before src so its fake system headers (Arduino.h,
# BLE*, M5Unified.h) shadow the real ESP32 ones. src/ is not built into the
# test binary (test_build_src defaults off); tests unity-include the .cpp
# they exercise.
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -I${PROJECT_DIR}/test/mocks
    -I${PROJECT_DIR}/src